<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JILGM Masterclass</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK Compat (Parallel Loading) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script type="module" src="auth.js?v=2.4"></script>
    <script src="transitions.js" defer></script>
    <script src="theme.js?v=1782926021279"></script>
</head>

<body class="auth-page page-loading">

    <div class="glass-card auth-card">
        <a href="index.html" class="logo-auth-brand">
            <img src="logo.png?v=2.0" alt="JILGM Riyadh Logo" class="auth-logo">
        </a>
        
        <h2 style="margin-bottom: 0.5rem;">Enroll Today!</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Submit your application and take the next step in your leadership journey.</p>

        <div id="registerMsg" class="auth-error" style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3); color: #4ade80;">
            Registration submitted! Awaiting admin approval.
        </div>
        
        <div id="errorMsg" class="auth-error">
            An error occurred. Please try again.
        </div>

        <form id="registerForm" class="auth-form" style="margin-top: 1rem;">
            <div style="text-align: left;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">First Name</label>
                <input type="text" id="firstName" required class="glass-input" placeholder="e.g., John">
            </div>
            
            <div style="text-align: left;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Last Name</label>
                <input type="text" id="lastName" required class="glass-input" placeholder="e.g., Doe">
            </div>

            <div style="text-align: left;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Email Address</label>
                <input type="email" id="email" required class="glass-input" placeholder="you@example.com">
            </div>

            <div style="text-align: left;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Outreach Number</label>
                <select id="outreach" required class="glass-input" style="width: 100%; background: rgba(0, 0, 0, 0.4); color: var(--text-primary); font-family: inherit; height: 50px;">
                    <option value="" disabled selected>Select Outreach Number (1-19)</option>
                    <option value="1">Outreach 1</option>
                    <option value="2">Outreach 2</option>
                    <option value="3">Outreach 3</option>
                    <option value="4">Outreach 4</option>
                    <option value="5">Outreach 5</option>
                    <option value="6">Outreach 6</option>
                    <option value="7">Outreach 7</option>
                    <option value="8">Outreach 8</option>
                    <option value="9">Outreach 9</option>
                    <option value="10">Outreach 10</option>
                    <option value="11">Outreach 11</option>
                    <option value="12">Outreach 12</option>
                    <option value="13">Outreach 13</option>
                    <option value="14">Outreach 14</option>
                    <option value="15">Outreach 15</option>
                    <option value="16">Outreach 16</option>
                    <option value="17">Outreach 17</option>
                    <option value="18">Outreach 18</option>
                    <option value="19">Outreach 19</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Submit Application</button>
        </form>
        
        <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-secondary);">
            <p>Already approved? <a href="login.html" style="color: var(--accent-gold); text-decoration: none;">Get your login details here.</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            const successMsg = document.getElementById('registerMsg');
            const errorMsg = document.getElementById('errorMsg');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                successMsg.classList.remove('show');
                errorMsg.classList.remove('show');
                
                const btn = form.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = 'Submitting...';
                
                const firstName = document.getElementById('firstName').value;
                const lastName = document.getElementById('lastName').value;
                const email = document.getElementById('email').value;
                const outreach = document.getElementById('outreach').value;

                // Wait for the background cloud sync promise to complete if active
                if (window.syncPromise) {
                    try { await window.syncPromise; } catch(err) { console.warn(err); }
                }
                if (window.firebaseSyncPromise) {
                    try { await window.firebaseSyncPromise; } catch(err) { console.warn(err); }
                }

                setTimeout(async () => {
                    const res = await AuthAPI.registerStudent(firstName, lastName, email, outreach);
                    btn.innerText = originalText;
                    
                    if (res.success) {
                        form.reset();
                        successMsg.innerText = "Registration submitted! Please wait for admin approval.";
                        successMsg.classList.add('show');
                    } else {
                        errorMsg.innerText = res.error;
                        errorMsg.classList.add('show');
                    }
                }, 400);

            });
        });
    </script>
</body>
</html>
