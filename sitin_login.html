<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sit-In Student Login - JILGM Masterclass</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo.png?v=2.0">
    <!-- Firebase SDK Compat (Parallel Loading) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script type="module" src="auth.js?v=2.4"></script>
    <script src="transitions.js" defer></script>
    <script src="theme.js?v=1782926021273"></script>
</head>

<body class="auth-page page-loading">

    <div class="glass-card auth-card" style="max-width: 450px; width: 100%; border-color: rgba(245, 158, 11, 0.35);">
        <a href="index.html" class="logo-auth-brand">
            <img src="logo.png?v=2.0" alt="JILGM Riyadh Logo" class="auth-logo" style="filter: drop-shadow(0 4px 10px rgba(245, 158, 11, 0.15));">
        </a>
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <span style="font-size: 2.2rem; filter: drop-shadow(0 2px 8px rgba(245, 158, 11, 0.3));">📖</span>
            <h2 style="margin-top: 0.8rem; margin-bottom: 0.5rem; font-size: 1.6rem; color: #f59e0b;">Sit-In Student Portal</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to access your sit-in observer dashboard</p>
        </div>

        <!-- LOGIN PANEL -->
        <div id="panel-login">
            <div id="loginError" class="auth-error">
                Invalid sit-in credentials. Please try again.
            </div>

            <form id="loginForm" class="auth-form" style="margin-top: 1rem;">
                <div style="text-align: left;">
                    <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Username</label>
                    <input type="text" id="username" required class="glass-input" placeholder="e.g., jsmith">
                </div>
                
                <div style="text-align: left;">
                    <label style="display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Password</label>
                    <input type="password" id="password" required class="glass-input" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.2rem; font-weight: bold; background: linear-gradient(135deg, #f59e0b, #d97706); border-color: #f59e0b;">Sign In as Observer</button>
            </form>
        </div>
        
        <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-secondary); display: flex; flex-direction: column; gap: 0.5rem;">
            <p>Are you a regular apprentice? <a href="login.html" style="color: var(--accent-gold); text-decoration: none; font-weight: 500;">Regular Student Sign In →</a></p>
            <p><a href="index.html" style="color: var(--text-secondary); text-decoration: none;">← Return to Main Site</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect to appropriate dashboard if already logged in
            const currentUser = AuthAPI.getCurrentUser();
            if (currentUser) {
                window.location.href = currentUser.isSitIn ? 'sitin_dashboard.html' : 'dashboard.html';
            }

            // Login submission
            const loginForm = document.getElementById('loginForm');
            const errorMsg = document.getElementById('loginError');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.classList.remove('show');
                
                const btn = loginForm.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = 'Authenticating...';
                
                const user = document.getElementById('username').value.trim();
                const pass = document.getElementById('password').value;

                if (window.syncPromise) {
                    try { await window.syncPromise; } catch(err) { console.warn(err); }
                }

                setTimeout(async () => {
                    const success = await AuthAPI.login(user, pass, true); // expectSitIn = true
                    btn.innerText = originalText;
                    if (success) {
                        window.location.href = 'sitin_dashboard.html';
                    } else {
                        errorMsg.classList.add('show');
                    }
                }, 400);
            });
        });
    </script>
</body>
</html>
